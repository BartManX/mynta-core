name: Build Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
      create_release:
        description: 'Create GitHub Release'
        required: true
        default: true
        type: boolean

env:
  MYNTA_VERSION: ${{ github.event.inputs.version }}

jobs:
  # =============================================================================
  # Linux x86_64 Build
  # =============================================================================
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            automake \
            autotools-dev \
            bsdmainutils \
            build-essential \
            curl \
            git \
            libtool \
            pkg-config \
            python3 \
            bison \
            libboost-all-dev \
            libevent-dev \
            libssl-dev \
            libdb++-dev \
            libminiupnpc-dev \
            libzmq3-dev \
            libqt5gui5 \
            libqt5core5a \
            libqt5dbus5 \
            qttools5-dev \
            qttools5-dev-tools \
            libprotobuf-dev \
            protobuf-compiler \
            libqrencode-dev \
            libfuse2 \
            zsync \
            desktop-file-utils \
            appstream

      - name: Build depends
        run: |
          cd depends
          make HOST=x86_64-linux-gnu -j$(nproc)

      - name: Configure
        run: |
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/x86_64-linux-gnu/share/config.site ./configure \
            --prefix=/ \
            --disable-ccache \
            --disable-maintainer-mode \
            --disable-dependency-tracking \
            --enable-glibc-back-compat \
            --enable-reduce-exports \
            --disable-bench \
            --disable-tests \
            --disable-gui-tests \
            CFLAGS="-O2 -g" \
            CXXFLAGS="-O2 -g" \
            LDFLAGS="-static-libstdc++"

      - name: Build
        run: make -j$(nproc)

      - name: Package tar.gz
        run: |
          mkdir -p release
          DISTNAME="mynta-${MYNTA_VERSION}"
          
          mkdir -p stage/${DISTNAME}/bin
          cp src/myntad stage/${DISTNAME}/bin/
          cp src/mynta-cli stage/${DISTNAME}/bin/
          cp src/mynta-tx stage/${DISTNAME}/bin/
          cp src/qt/mynta-qt stage/${DISTNAME}/bin/ || true
          
          strip stage/${DISTNAME}/bin/*
          
          cd stage
          tar -czvf ../release/${DISTNAME}-x86_64-linux-gnu.tar.gz ${DISTNAME}/

      - name: Package DEB
        run: |
          DISTNAME="mynta-${MYNTA_VERSION}"
          DEB_DIR="mynta_${MYNTA_VERSION}_amd64"
          
          mkdir -p ${DEB_DIR}/DEBIAN
          mkdir -p ${DEB_DIR}/usr/bin
          mkdir -p ${DEB_DIR}/usr/share/applications
          mkdir -p ${DEB_DIR}/usr/share/icons/hicolor/256x256/apps
          mkdir -p ${DEB_DIR}/usr/share/doc/mynta
          
          # Copy binaries
          cp src/myntad ${DEB_DIR}/usr/bin/
          cp src/mynta-cli ${DEB_DIR}/usr/bin/
          cp src/mynta-tx ${DEB_DIR}/usr/bin/
          cp src/qt/mynta-qt ${DEB_DIR}/usr/bin/ || true
          strip ${DEB_DIR}/usr/bin/*
          
          # Create control file
          cat > ${DEB_DIR}/DEBIAN/control << EOF
          Package: mynta
          Version: ${MYNTA_VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libboost-system1.74.0, libboost-filesystem1.74.0, libboost-thread1.74.0, libevent-2.1-7, libssl3, libminiupnpc17, libzmq5, libqt5widgets5, libqt5gui5, libqt5network5, libqt5dbus5, libqrencode4
          Maintainer: Mynta Developers <dev@myntacoin.org>
          Description: Mynta Core - Full node and wallet
           Mynta is a peer-to-peer digital currency with asset support.
           This package includes the Qt wallet and command-line tools.
          EOF
          
          # Create desktop file
          cat > ${DEB_DIR}/usr/share/applications/mynta-qt.desktop << EOF
          [Desktop Entry]
          Name=Mynta Core
          Comment=Mynta wallet and full node
          Exec=mynta-qt %u
          Terminal=false
          Type=Application
          Icon=mynta
          Categories=Finance;Network;
          MimeType=x-scheme-handler/mynta;
          EOF
          
          # Copy icon if exists
          cp share/pixmaps/raven256.png ${DEB_DIR}/usr/share/icons/hicolor/256x256/apps/mynta.png || true
          
          # Copy docs
          cp doc/RELEASE_GUIDE.md ${DEB_DIR}/usr/share/doc/mynta/
          
          # Build DEB
          dpkg-deb --build ${DEB_DIR}
          mv ${DEB_DIR}.deb release/mynta_${MYNTA_VERSION}_amd64.deb

      - name: Package AppImage
        run: |
          DISTNAME="mynta-${MYNTA_VERSION}"
          
          # Download linuxdeploy
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          
          # Create AppDir structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          
          cp src/qt/mynta-qt AppDir/usr/bin/ || echo "Qt wallet not built"
          cp src/myntad AppDir/usr/bin/
          cp src/mynta-cli AppDir/usr/bin/
          
          # Create desktop file
          cat > AppDir/usr/share/applications/mynta-qt.desktop << EOF
          [Desktop Entry]
          Name=Mynta Core
          Comment=Mynta wallet and full node
          Exec=mynta-qt
          Terminal=false
          Type=Application
          Icon=mynta
          Categories=Finance;Network;
          EOF
          
          # Copy icon
          cp share/pixmaps/raven256.png AppDir/usr/share/icons/hicolor/256x256/apps/mynta.png || \
            convert -size 256x256 xc:#d4af37 AppDir/usr/share/icons/hicolor/256x256/apps/mynta.png || true
          
          # Build AppImage
          export VERSION=${MYNTA_VERSION}
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --plugin qt --output appimage || \
            echo "AppImage creation skipped - Qt wallet may not be available"
          
          mv Mynta*.AppImage release/Mynta-${MYNTA_VERSION}-x86_64.AppImage 2>/dev/null || true

      - name: Generate checksums
        run: |
          cd release
          for f in *.tar.gz *.deb *.AppImage; do
            [ -f "$f" ] && sha256sum "$f" > "${f}.sha256sum"
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: release/

  # =============================================================================
  # Windows x64 Build
  # =============================================================================
  build-windows:
    name: Windows x64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            automake \
            autotools-dev \
            bsdmainutils \
            build-essential \
            curl \
            mingw-w64 \
            mingw-w64-x86-64-dev \
            git \
            libtool \
            nsis \
            pkg-config \
            python3 \
            zip \
            bison \
            osslsigncode
          
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix

      - name: Build depends
        run: |
          cd depends
          make HOST=x86_64-w64-mingw32 -j$(nproc)

      - name: Configure
        run: |
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/x86_64-w64-mingw32/share/config.site ./configure \
            --prefix=/ \
            --disable-ccache \
            --disable-maintainer-mode \
            --disable-dependency-tracking \
            --enable-reduce-exports \
            --disable-bench \
            --disable-tests \
            --disable-gui-tests \
            --enable-shared=no \
            CFLAGS="-O2 -g" \
            CXXFLAGS="-O2 -g"

      - name: Build
        run: make -j$(nproc)

      - name: Package ZIP
        run: |
          mkdir -p release
          DISTNAME="mynta-${MYNTA_VERSION}"
          
          mkdir -p stage/${DISTNAME}
          cp src/myntad.exe stage/${DISTNAME}/
          cp src/mynta-cli.exe stage/${DISTNAME}/
          cp src/mynta-tx.exe stage/${DISTNAME}/
          cp src/qt/mynta-qt.exe stage/${DISTNAME}/ || true
          cp doc/RELEASE_GUIDE.md stage/${DISTNAME}/README.md
          
          x86_64-w64-mingw32-strip stage/${DISTNAME}/*.exe
          
          cd stage
          zip -r ../release/${DISTNAME}-win64.zip ${DISTNAME}/

      - name: Package NSIS Installer
        run: |
          # Create NSIS setup if make deploy is available
          make deploy 2>/dev/null || echo "NSIS installer build attempted"
          mv *-setup.exe release/mynta-${MYNTA_VERSION}-win64-setup.exe 2>/dev/null || true

      - name: Create MSI Installer
        run: |
          # Install WiX tools via Wine
          sudo apt-get install -y wine64 || true
          
          DISTNAME="mynta-${MYNTA_VERSION}"
          
          # Create WiX source file
          cat > mynta.wxs << 'WIXEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://schemas.microsoft.com/wix/2006/wi">
            <Product Id="*" Name="Mynta Core" Language="1033" Version="${MYNTA_VERSION}.0" 
                     Manufacturer="Mynta Developers" UpgradeCode="12345678-1234-1234-1234-123456789012">
              <Package InstallerVersion="200" Compressed="yes" InstallScope="perMachine"/>
              <MajorUpgrade DowngradeErrorMessage="A newer version is already installed."/>
              <MediaTemplate EmbedCab="yes"/>
              
              <Feature Id="MainFeature" Title="Mynta Core" Level="1">
                <ComponentGroupRef Id="ProductComponents"/>
              </Feature>
              
              <Directory Id="TARGETDIR" Name="SourceDir">
                <Directory Id="ProgramFiles64Folder">
                  <Directory Id="INSTALLFOLDER" Name="Mynta">
                    <Component Id="MainExecutable" Guid="*">
                      <File Id="MyntaQt" Source="stage/${DISTNAME}/mynta-qt.exe" KeyPath="yes"/>
                      <File Id="Myntad" Source="stage/${DISTNAME}/myntad.exe"/>
                      <File Id="MyntaCli" Source="stage/${DISTNAME}/mynta-cli.exe"/>
                      <File Id="MyntaTx" Source="stage/${DISTNAME}/mynta-tx.exe"/>
                    </Component>
                  </Directory>
                </Directory>
                <Directory Id="ProgramMenuFolder">
                  <Directory Id="ApplicationProgramsFolder" Name="Mynta"/>
                </Directory>
              </Directory>
              
              <ComponentGroup Id="ProductComponents" Directory="INSTALLFOLDER">
                <ComponentRef Id="MainExecutable"/>
              </ComponentGroup>
            </Product>
          </Wix>
          WIXEOF
          
          echo "MSI creation requires WiX Toolset - skipping in CI for now"
          # For full MSI support, would need WiX installed

      - name: Generate checksums
        run: |
          cd release
          for f in *.zip *.exe *.msi; do
            [ -f "$f" ] && sha256sum "$f" > "${f}.sha256sum"
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: release/

  # =============================================================================
  # macOS x64 Build
  # =============================================================================
  build-macos:
    name: macOS x64
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install \
            automake \
            libtool \
            pkg-config \
            boost \
            libevent \
            openssl@3 \
            miniupnpc \
            zeromq \
            qt@5 \
            qrencode \
            protobuf \
            berkeley-db@4 \
            create-dmg

      - name: Configure
        run: |
          ./autogen.sh
          ./configure \
            --prefix=/ \
            --disable-ccache \
            --disable-maintainer-mode \
            --disable-dependency-tracking \
            --enable-reduce-exports \
            --disable-bench \
            --disable-tests \
            --disable-gui-tests \
            --with-boost=$(brew --prefix boost) \
            --with-qt=$(brew --prefix qt@5) \
            CFLAGS="-O2" \
            CXXFLAGS="-O2" \
            LDFLAGS="-L$(brew --prefix openssl@3)/lib -L$(brew --prefix berkeley-db@4)/lib" \
            CPPFLAGS="-I$(brew --prefix openssl@3)/include -I$(brew --prefix berkeley-db@4)/include"

      - name: Build
        run: make -j$(sysctl -n hw.ncpu)

      - name: Package tar.gz
        run: |
          mkdir -p release
          DISTNAME="mynta-${MYNTA_VERSION}"
          
          mkdir -p stage/${DISTNAME}/bin
          cp src/myntad stage/${DISTNAME}/bin/
          cp src/mynta-cli stage/${DISTNAME}/bin/
          cp src/mynta-tx stage/${DISTNAME}/bin/
          cp src/qt/mynta-qt stage/${DISTNAME}/bin/ || true
          
          strip stage/${DISTNAME}/bin/* 2>/dev/null || true
          
          cd stage
          tar -czvf ../release/${DISTNAME}-osx64.tar.gz ${DISTNAME}/

      - name: Package DMG
        run: |
          DISTNAME="mynta-${MYNTA_VERSION}"
          
          # Create app bundle structure
          mkdir -p "Mynta-Qt.app/Contents/MacOS"
          mkdir -p "Mynta-Qt.app/Contents/Resources"
          
          # Copy binary
          cp src/qt/mynta-qt "Mynta-Qt.app/Contents/MacOS/Mynta-Qt" || exit 0
          
          # Create Info.plist
          cat > "Mynta-Qt.app/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>Mynta-Qt</string>
            <key>CFBundleIdentifier</key>
            <string>org.myntacoin.Mynta-Qt</string>
            <key>CFBundleName</key>
            <string>Mynta-Qt</string>
            <key>CFBundleVersion</key>
            <string>${MYNTA_VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${MYNTA_VERSION}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.14</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF
          
          # Create DMG
          if [ -f "src/qt/mynta-qt" ]; then
            create-dmg \
              --volname "Mynta Core ${MYNTA_VERSION}" \
              --window-pos 200 120 \
              --window-size 600 400 \
              --icon-size 100 \
              --app-drop-link 400 185 \
              "release/${DISTNAME}-osx64.dmg" \
              "Mynta-Qt.app" || echo "DMG creation completed with warnings"
          fi

      - name: Generate checksums
        run: |
          cd release
          for f in *.tar.gz *.dmg; do
            [ -f "$f" ] && shasum -a 256 "$f" > "${f}.sha256sum"
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: release/

  # =============================================================================
  # Create GitHub Release
  # =============================================================================
  create-release:
    name: Create Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.create_release == 'true' }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          
          # Move all files to release directory
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.exe" -o -name "*.dmg" -o -name "*.sha256sum" \) -exec mv {} release/ \;
          
          # Create combined SHA256SUMS file
          cd release
          cat *.sha256sum > SHA256SUMS.txt 2>/dev/null || true
          rm -f *.sha256sum
          
          # Copy documentation
          cp ../doc/RELEASE_GUIDE.md ./
          
          echo "=== Release Files ==="
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Mynta Core v${{ github.event.inputs.version }}
          body: |
            ## Mynta Core v${{ github.event.inputs.version }}
            
            ### Quick Start
            
            **The Mynta-Qt wallet includes a built-in daemon.** You do NOT need `myntad` unless running a headless server.
            
            | Binary | Purpose |
            |--------|---------|
            | `mynta-qt` | Full GUI wallet (recommended) |
            | `myntad` | Headless daemon (servers only) |
            | `mynta-cli` | Command-line interface |
            
            ---
            
            ### Downloads
            
            #### 🐧 Linux
            | Format | File | Description |
            |--------|------|-------------|
            | DEB | `mynta_${{ github.event.inputs.version }}_amd64.deb` | Ubuntu/Debian installer |
            | AppImage | `Mynta-${{ github.event.inputs.version }}-x86_64.AppImage` | Portable, run anywhere |
            | tar.gz | `mynta-${{ github.event.inputs.version }}-x86_64-linux-gnu.tar.gz` | Manual install |
            
            #### 🪟 Windows
            | Format | File | Description |
            |--------|------|-------------|
            | Installer | `mynta-${{ github.event.inputs.version }}-win64-setup.exe` | NSIS installer |
            | ZIP | `mynta-${{ github.event.inputs.version }}-win64.zip` | Portable |
            
            #### 🍎 macOS
            | Format | File | Description |
            |--------|------|-------------|
            | DMG | `mynta-${{ github.event.inputs.version }}-osx64.dmg` | Disk image installer |
            | tar.gz | `mynta-${{ github.event.inputs.version }}-osx64.tar.gz` | Manual install |
            
            ---
            
            ### Installation
            
            **Linux (DEB):**
            ```bash
            sudo dpkg -i mynta_${{ github.event.inputs.version }}_amd64.deb
            mynta-qt
            ```
            
            **Linux (AppImage):**
            ```bash
            chmod +x Mynta-${{ github.event.inputs.version }}-x86_64.AppImage
            ./Mynta-${{ github.event.inputs.version }}-x86_64.AppImage
            ```
            
            **Windows:** Run the installer or extract ZIP
            
            **macOS:** Open DMG, drag to Applications
            
            ---
            
            ### Verification
            
            ```bash
            sha256sum -c SHA256SUMS.txt
            ```
            
            ### Common Startup Flags
            
            ```bash
            mynta-qt -testnet          # Testnet mode
            mynta-qt -gen              # Enable mining
            mynta-qt -server           # Enable RPC server
            mynta-qt -datadir=/path    # Custom data directory
            ```
            
            See `RELEASE_GUIDE.md` for full documentation.
            
            ---
            
            ### Provably Fair Launch
            
            - ✅ 3% dev allocation enforced at consensus (no bypass possible)
            - ✅ No premine - genesis follows standard subsidy rules
            - ✅ Chain start: January 15, 2026 00:00:00 UTC
            
          draft: false
          prerelease: false
          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
