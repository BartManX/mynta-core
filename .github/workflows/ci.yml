name: CI

on:
  push:
    branches:
      - main
      - master
      - 'feature/**'
      - 'release/**'
  pull_request:
    branches:
      - main
      - master

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =============================================================================
  # Linux Build (uses depends for reproducibility)
  # =============================================================================
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            automake \
            autotools-dev \
            bsdmainutils \
            build-essential \
            curl \
            libtool \
            pkg-config \
            python3 \
            bison

      - name: Cache depends sources
        uses: actions/cache@v4
        with:
          path: depends/sources
          key: depends-sources-${{ hashFiles('depends/packages/*.mk') }}
          restore-keys: |
            depends-sources-

      - name: Cache depends built (Linux)
        uses: actions/cache@v4
        with:
          path: depends/built
          # v7: cache bust for zlib package added
          key: linux-depends-v7-${{ hashFiles('depends/packages/*.mk') }}-${{ hashFiles('depends/hosts/linux.mk') }}
          restore-keys: |
            linux-depends-v7-

      - name: Build depends
        run: |
          cd depends
          make HOST=x86_64-linux-gnu NO_QT=1 -j$(nproc)

      - name: Autogen
        run: ./autogen.sh

      - name: Configure
        run: |
          CONFIG_SITE=$PWD/depends/x86_64-linux-gnu/share/config.site ./configure \
            --prefix=/ \
            --disable-bench \
            --disable-tests \
            --disable-gui-tests \
            --disable-man \
            --disable-ccache \
            --without-gui \
            --enable-reduce-exports

      - name: Build
        run: make -j$(nproc)

      - name: Verify binaries
        run: |
          ./src/myntad --version
          ./src/mynta-cli --version

  # =============================================================================
  # Windows Cross-Compile (Uses depends for accuracy)
  # =============================================================================
  build-windows:
    name: Windows x64 (cross)
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            automake \
            autotools-dev \
            bsdmainutils \
            build-essential \
            curl \
            g++-mingw-w64-x86-64 \
            gcc-mingw-w64-x86-64 \
            libtool \
            pkg-config \
            python3 \
            bison
          
          # Set MinGW to use POSIX threads (required for C++11/17)
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix
          sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix

      - name: Cache depends sources
        uses: actions/cache@v4
        with:
          path: depends/sources
          key: depends-sources-${{ hashFiles('depends/packages/*.mk') }}
          restore-keys: |
            depends-sources-

      - name: Cache depends built (Windows)
        uses: actions/cache@v4
        with:
          path: depends/built
          # v10: cache bust for zlib package added
          key: windows-depends-v10-${{ hashFiles('depends/packages/*.mk') }}-${{ hashFiles('depends/hosts/mingw32.mk') }}
          restore-keys: |
            windows-depends-v10-

      - name: Verify MinGW threading
        run: |
          # Confirm we're using posix threading
          x86_64-w64-mingw32-g++ --version | head -1
          echo "Threading model:"
          x86_64-w64-mingw32-g++ -v 2>&1 | grep -i thread || echo "Could not determine threading model"

      - name: Build depends
        run: |
          cd depends
          make HOST=x86_64-w64-mingw32 NO_QT=1 -j$(nproc)

      - name: Autogen
        run: ./autogen.sh

      - name: Configure
        run: |
          CONFIG_SITE=$PWD/depends/x86_64-w64-mingw32/share/config.site ./configure \
            --prefix=/ \
            --host=x86_64-w64-mingw32 \
            --disable-bench \
            --disable-tests \
            --disable-gui-tests \
            --disable-man \
            --without-gui \
            --enable-reduce-exports

      - name: Build
        run: make -j$(nproc)

      - name: Verify binaries
        run: |
          file src/myntad.exe
          file src/mynta-cli.exe

  # =============================================================================
  # macOS Build (uses depends for reproducibility)
  # =============================================================================
  build-macos:
    name: macOS (native)
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install automake libtool pkg-config
          # Install setuptools - use --break-system-packages for PEP 668 compliant systems
          # This is safe in CI where we control the environment
          python3 -m pip install --break-system-packages setuptools

      - name: Cache depends sources
        uses: actions/cache@v4
        with:
          path: depends/sources
          key: depends-sources-${{ hashFiles('depends/packages/*.mk') }}
          restore-keys: |
            depends-sources-

      - name: Cache depends built (macOS)
        uses: actions/cache@v4
        with:
          path: depends/built
          # v17: cache bust for darwin LDFLAGS sysroot
          key: macos-depends-v17-${{ hashFiles('depends/packages/*.mk') }}-${{ hashFiles('depends/hosts/darwin.mk') }}
          restore-keys: |
            macos-depends-v6-

      - name: Build depends
        run: |
          cd depends
          # Use system clang with proper Xcode SDK detection
          make NO_QT=1 FORCE_USE_SYSTEM_CLANG=1 -j$(sysctl -n hw.ncpu)

      - name: Autogen
        run: ./autogen.sh

      - name: Configure
        run: |
          CONFIG_SITE=$PWD/depends/$(depends/config.guess)/share/config.site ./configure \
            --prefix=/ \
            --disable-bench \
            --disable-tests \
            --disable-gui-tests \
            --disable-man \
            --without-gui \
            --enable-reduce-exports

      - name: Build
        run: make -j$(sysctl -n hw.ncpu)

      - name: Verify binaries
        run: |
          ./src/myntad --version
          ./src/mynta-cli --version

  # =============================================================================
  # Summary Job (Required for branch protection)
  # =============================================================================
  ci-success:
    name: CI Success
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.build-linux.result }}" != "success" ]]; then
            echo "Linux build failed"
            exit 1
          fi
          if [[ "${{ needs.build-windows.result }}" != "success" ]]; then
            echo "Windows build failed"
            exit 1
          fi
          if [[ "${{ needs.build-macos.result }}" != "success" ]]; then
            echo "macOS build failed"
            exit 1
          fi
          echo "All CI jobs passed!"
