# Build Release Workflow
#
# Creates release binaries for Linux and Windows.
# BLST library is built automatically via autotools integration.
#
# Trigger: Manual (workflow_dispatch) only
# For CI on PRs/push, see ci.yml

name: Build Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (leave empty to auto-detect from configure.ac)'
        required: false
        type: string
        default: ''
      create_release:
        description: 'Create GitHub Release'
        required: true
        default: true
        type: boolean

jobs:
  # =============================================================================
  # Linux x86_64 Build (using depends for reproducibility)
  # =============================================================================
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Extract version from configure.ac
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Extract version from configure.ac (single source of truth)
            VERSION_MAJOR=$(grep "define(_CLIENT_VERSION_MAJOR" configure.ac | sed 's/.*,\s*\([0-9]*\)).*/\1/')
            VERSION_MINOR=$(grep "define(_CLIENT_VERSION_MINOR" configure.ac | sed 's/.*,\s*\([0-9]*\)).*/\1/')
            VERSION_REVISION=$(grep "define(_CLIENT_VERSION_REVISION" configure.ac | sed 's/.*,\s*\([0-9]*\)).*/\1/')
            VERSION="${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_REVISION}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected version: ${VERSION}"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            automake \
            autotools-dev \
            bsdmainutils \
            build-essential \
            curl \
            git \
            libtool \
            pkg-config \
            python3 \
            bison

      - name: Cache depends sources
        uses: actions/cache@v4
        with:
          path: depends/sources
          key: depends-sources-${{ hashFiles('depends/packages/*.mk') }}
          restore-keys: |
            depends-sources-

      - name: Cache depends built
        uses: actions/cache@v4
        with:
          path: depends/built
          key: linux-depends-built-${{ hashFiles('depends/packages/*.mk') }}-${{ hashFiles('depends/hosts/*.mk') }}
          restore-keys: |
            linux-depends-built-

      - name: Build depends
        run: |
          cd depends
          make HOST=x86_64-linux-gnu NO_QT=1 -j$(nproc)

      - name: Configure
        run: |
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/x86_64-linux-gnu/share/config.site ./configure \
            --prefix=/ \
            --disable-ccache \
            --disable-maintainer-mode \
            --disable-dependency-tracking \
            --enable-glibc-back-compat \
            --enable-reduce-exports \
            --disable-bench \
            --disable-tests \
            --disable-gui-tests \
            --without-gui \
            CFLAGS="-O2 -g" \
            CXXFLAGS="-O2 -g" \
            LDFLAGS="-static-libstdc++"

      - name: Build
        run: make -j$(nproc)

      - name: Package tar.gz
        env:
          MYNTA_VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p release
          DISTNAME="mynta-${MYNTA_VERSION}"
          
          mkdir -p stage/${DISTNAME}/bin
          cp src/myntad stage/${DISTNAME}/bin/
          cp src/mynta-cli stage/${DISTNAME}/bin/
          
          # Strip binaries
          strip stage/${DISTNAME}/bin/* 2>/dev/null || true
          
          # Add README
          cp doc/RELEASE_GUIDE.md stage/${DISTNAME}/README.md 2>/dev/null || echo "No README found"
          
          cd stage
          tar -czvf ../release/${DISTNAME}-x86_64-linux-gnu.tar.gz ${DISTNAME}/

      - name: Package DEB
        env:
          MYNTA_VERSION: ${{ steps.version.outputs.version }}
        run: |
          DISTNAME="mynta-${MYNTA_VERSION}"
          DEB_DIR="mynta_${MYNTA_VERSION}_amd64"
          
          mkdir -p ${DEB_DIR}/DEBIAN
          mkdir -p ${DEB_DIR}/usr/bin
          mkdir -p ${DEB_DIR}/usr/share/doc/mynta
          
          # Copy binaries
          cp src/myntad ${DEB_DIR}/usr/bin/
          cp src/mynta-cli ${DEB_DIR}/usr/bin/
          strip ${DEB_DIR}/usr/bin/* 2>/dev/null || true
          
          # Create control file
          cat > ${DEB_DIR}/DEBIAN/control << EOF
          Package: mynta
          Version: ${MYNTA_VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libc6 (>= 2.31), libgcc-s1 (>= 3.0), libstdc++6 (>= 11)
          Maintainer: Mynta Developers <dev@myntacoin.org>
          Description: Mynta Core - Full node daemon and CLI tools
           Mynta is a peer-to-peer digital currency with asset support.
           This package includes the daemon and command-line tools.
          EOF
          
          # Copy docs
          cp doc/RELEASE_GUIDE.md ${DEB_DIR}/usr/share/doc/mynta/ 2>/dev/null || true
          
          # Build DEB
          dpkg-deb --build ${DEB_DIR}
          mv ${DEB_DIR}.deb release/mynta_${MYNTA_VERSION}_amd64.deb

      - name: Generate checksums
        run: |
          cd release
          for f in *.tar.gz *.deb; do
            [ -f "$f" ] && sha256sum "$f" > "${f}.sha256sum"
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: release/

  # =============================================================================
  # Windows x64 Build (cross-compile from Linux)
  # =============================================================================
  build-windows:
    name: Windows x64
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Extract version from configure.ac
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Extract version from configure.ac (single source of truth)
            VERSION_MAJOR=$(grep "define(_CLIENT_VERSION_MAJOR" configure.ac | sed 's/.*,\s*\([0-9]*\)).*/\1/')
            VERSION_MINOR=$(grep "define(_CLIENT_VERSION_MINOR" configure.ac | sed 's/.*,\s*\([0-9]*\)).*/\1/')
            VERSION_REVISION=$(grep "define(_CLIENT_VERSION_REVISION" configure.ac | sed 's/.*,\s*\([0-9]*\)).*/\1/')
            VERSION="${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_REVISION}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected version: ${VERSION}"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            automake \
            autotools-dev \
            bsdmainutils \
            build-essential \
            curl \
            g++-mingw-w64-x86-64 \
            gcc-mingw-w64-x86-64 \
            git \
            libtool \
            pkg-config \
            python3 \
            zip \
            bison
          
          # Set MinGW to use POSIX threads (required for C++11/17)
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix
          sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix

      - name: Cache depends sources
        uses: actions/cache@v4
        with:
          path: depends/sources
          key: depends-sources-${{ hashFiles('depends/packages/*.mk') }}
          restore-keys: |
            depends-sources-

      - name: Cache depends built
        uses: actions/cache@v4
        with:
          path: depends/built
          key: windows-depends-built-${{ hashFiles('depends/packages/*.mk') }}-${{ hashFiles('depends/hosts/*.mk') }}
          restore-keys: |
            windows-depends-built-

      - name: Build depends
        run: |
          cd depends
          make HOST=x86_64-w64-mingw32 NO_QT=1 -j$(nproc)

      - name: Configure
        run: |
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/x86_64-w64-mingw32/share/config.site ./configure \
            --prefix=/ \
            --host=x86_64-w64-mingw32 \
            --disable-ccache \
            --disable-maintainer-mode \
            --disable-dependency-tracking \
            --enable-reduce-exports \
            --disable-bench \
            --disable-tests \
            --disable-gui-tests \
            --without-gui \
            --enable-shared=no \
            CFLAGS="-O2 -g" \
            CXXFLAGS="-O2 -g"

      - name: Build
        run: make -j$(nproc)

      - name: Package ZIP
        env:
          MYNTA_VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p release
          DISTNAME="mynta-${MYNTA_VERSION}"
          
          mkdir -p stage/${DISTNAME}
          cp src/myntad.exe stage/${DISTNAME}/
          cp src/mynta-cli.exe stage/${DISTNAME}/
          cp doc/RELEASE_GUIDE.md stage/${DISTNAME}/README.md 2>/dev/null || echo "No README found"
          
          x86_64-w64-mingw32-strip stage/${DISTNAME}/*.exe 2>/dev/null || true
          
          cd stage
          zip -r ../release/${DISTNAME}-win64.zip ${DISTNAME}/

      - name: Generate checksums
        run: |
          cd release
          for f in *.zip; do
            [ -f "$f" ] && sha256sum "$f" > "${f}.sha256sum"
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: release/

  # =============================================================================
  # Create GitHub Release
  # =============================================================================
  create-release:
    name: Create Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.create_release == 'true' }}
    permissions:
      contents: write
    env:
      # Use version from build-linux job output (auto-detected from configure.ac if not provided)
      RELEASE_VERSION: ${{ needs.build-linux.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          
          # Move all files to release directory
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.deb" -o -name "*.sha256sum" \) -exec mv {} release/ \;
          
          # Create combined SHA256SUMS file
          cd release
          cat *.sha256sum > SHA256SUMS.txt 2>/dev/null || true
          rm -f *.sha256sum
          
          # Copy documentation
          cp ../doc/RELEASE_GUIDE.md ./ 2>/dev/null || true
          
          echo "=== Release Files ==="
          ls -la
          echo "=== Release Version: ${{ env.RELEASE_VERSION }} ==="

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.RELEASE_VERSION }}
          name: Mynta Core v${{ env.RELEASE_VERSION }}
          body: |
            ## Mynta Core v${{ env.RELEASE_VERSION }}
            
            ### ⚠️ Important Notes
            
            This release includes daemon binaries only (no GUI wallet). The GUI wallet will be available in a future release.
            
            | Binary | Purpose |
            |--------|---------|
            | `myntad` | Full node daemon |
            | `mynta-cli` | Command-line RPC interface |
            
            ---
            
            ### Downloads
            
            #### 🐧 Linux (x86_64)
            | Format | File | Description |
            |--------|------|-------------|
            | DEB | `mynta_${{ env.RELEASE_VERSION }}_amd64.deb` | Ubuntu/Debian installer |
            | tar.gz | `mynta-${{ env.RELEASE_VERSION }}-x86_64-linux-gnu.tar.gz` | Manual install |
            
            **Installation:**
            ```bash
            # DEB (Ubuntu/Debian)
            sudo dpkg -i mynta_${{ env.RELEASE_VERSION }}_amd64.deb
            myntad -daemon
            
            # Manual (tar.gz)
            tar -xzf mynta-${{ env.RELEASE_VERSION }}-x86_64-linux-gnu.tar.gz
            ./mynta-${{ env.RELEASE_VERSION }}/bin/myntad -daemon
            ```
            
            #### 🪟 Windows (x64)
            | Format | File | Description |
            |--------|------|-------------|
            | ZIP | `mynta-${{ env.RELEASE_VERSION }}-win64.zip` | Portable |
            
            **Installation:**
            1. Download and extract the ZIP
            2. Run `myntad.exe` to start the daemon
            3. Use `mynta-cli.exe` to interact with it
            
            **Configuration file location:** `%APPDATA%\Mynta\mynta.conf`
            
            ---
            
            ### Quick Start
            
            1. Create config file:
            ```ini
            # ~/.mynta/mynta.conf (Linux) or %APPDATA%\Mynta\mynta.conf (Windows)
            server=1
            rpcuser=myntarpc
            rpcpassword=your_secure_password_here
            ```
            
            2. Start the daemon:
            ```bash
            myntad -daemon
            ```
            
            3. Check status:
            ```bash
            mynta-cli getblockchaininfo
            ```
            
            ---
            
            ### Verification
            
            ```bash
            # Linux
            sha256sum -c SHA256SUMS.txt
            
            # Windows (PowerShell)
            Get-FileHash -Algorithm SHA256 mynta-${{ env.RELEASE_VERSION }}-win64.zip
            ```
            
            ---
            
            ### Network Information
            
            | Network | Port | RPC Port | Data Directory |
            |---------|------|----------|----------------|
            | Mainnet | 8767 | 8766 | `~/.mynta` (Linux), `%APPDATA%\Mynta` (Win) |
            | Testnet | 18770 | 18766 | `<datadir>/testnet3` |
            
            ### Chain Start Time
            
            - **Mainnet Launch:** January 15, 2026 00:00:00 UTC
            - Mining is not possible before this time
            
            ---
            
            ### Provably Fair Launch
            
            - ✅ 3% dev allocation enforced at consensus (no bypass possible)
            - ✅ No premine - genesis follows standard subsidy rules
            - ✅ All code is open source and auditable
            
          draft: false
          prerelease: false
          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
