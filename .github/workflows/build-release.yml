# Build Release Workflow
#
# Creates release binaries for Linux, Windows, and macOS (ARM64) with Qt GUI.
# Intel Mac users can run ARM64 binaries via Rosetta 2.
# BLST library is built automatically via autotools integration.
#
# Trigger: Manual (workflow_dispatch) only
# For CI on PRs/push, see ci.yml

name: Build Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (leave empty to auto-detect from configure.ac)'
        required: false
        type: string
        default: ''
      create_release:
        description: 'Create GitHub Release'
        required: true
        default: true
        type: boolean

jobs:
  # =============================================================================
  # Linux x86_64 Build with Qt GUI
  # =============================================================================
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Extract version from configure.ac
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Extract version from configure.ac (single source of truth)
            VERSION_MAJOR=$(grep "define(_CLIENT_VERSION_MAJOR" configure.ac | sed 's/.*,\s*\([0-9]*\)).*/\1/')
            VERSION_MINOR=$(grep "define(_CLIENT_VERSION_MINOR" configure.ac | sed 's/.*,\s*\([0-9]*\)).*/\1/')
            VERSION_REVISION=$(grep "define(_CLIENT_VERSION_REVISION" configure.ac | sed 's/.*,\s*\([0-9]*\)).*/\1/')
            VERSION="${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_REVISION}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected version: ${VERSION}"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            automake \
            autotools-dev \
            bsdmainutils \
            build-essential \
            curl \
            git \
            libtool \
            pkg-config \
            python3 \
            bison

      - name: Cache depends sources
        uses: actions/cache@v4
        with:
          path: depends/sources
          key: depends-sources-${{ hashFiles('depends/packages/*.mk') }}
          restore-keys: |
            depends-sources-

      - name: Cache depends built
        uses: actions/cache@v4
        with:
          path: depends/built
          key: linux-release-depends-qt-v1-${{ hashFiles('depends/packages/*.mk') }}-${{ hashFiles('depends/hosts/*.mk') }}
          restore-keys: |
            linux-release-depends-qt-v1-

      - name: Build depends (with Qt)
        run: |
          cd depends
          make HOST=x86_64-linux-gnu -j$(nproc)

      - name: Configure
        run: |
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/x86_64-linux-gnu/share/config.site ./configure \
            --prefix=/ \
            --disable-ccache \
            --disable-maintainer-mode \
            --disable-dependency-tracking \
            --enable-glibc-back-compat \
            --enable-reduce-exports \
            --disable-bench \
            --disable-tests \
            --disable-gui-tests \
            --disable-bip70 \
            CFLAGS="-O2 -g" \
            CXXFLAGS="-O2 -g" \
            LDFLAGS="-static-libstdc++"

      - name: Build
        run: make -j$(nproc)

      - name: Package tar.gz
        env:
          MYNTA_VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p release
          DISTNAME="mynta-${MYNTA_VERSION}"
          
          mkdir -p stage/${DISTNAME}/bin
          cp src/myntad stage/${DISTNAME}/bin/
          cp src/mynta-cli stage/${DISTNAME}/bin/
          cp src/qt/mynta-qt stage/${DISTNAME}/bin/ 2>/dev/null || echo "Qt wallet not built"
          
          # Strip binaries
          strip stage/${DISTNAME}/bin/* 2>/dev/null || true
          
          # Add README
          cp doc/RELEASE_GUIDE.md stage/${DISTNAME}/README.md 2>/dev/null || echo "No README found"
          
          cd stage
          tar -czvf ../release/${DISTNAME}-x86_64-linux-gnu.tar.gz ${DISTNAME}/

      - name: Package DEB
        env:
          MYNTA_VERSION: ${{ steps.version.outputs.version }}
        run: |
          DISTNAME="mynta-${MYNTA_VERSION}"
          DEB_DIR="mynta_${MYNTA_VERSION}_amd64"
          
          mkdir -p ${DEB_DIR}/DEBIAN
          mkdir -p ${DEB_DIR}/usr/bin
          mkdir -p ${DEB_DIR}/usr/share/doc/mynta
          mkdir -p ${DEB_DIR}/usr/share/applications
          mkdir -p ${DEB_DIR}/usr/share/pixmaps
          
          # Copy binaries
          cp src/myntad ${DEB_DIR}/usr/bin/
          cp src/mynta-cli ${DEB_DIR}/usr/bin/
          cp src/qt/mynta-qt ${DEB_DIR}/usr/bin/ 2>/dev/null || true
          strip ${DEB_DIR}/usr/bin/* 2>/dev/null || true
          
          # Create desktop entry for Qt wallet
          if [ -f src/qt/mynta-qt ]; then
            cat > ${DEB_DIR}/usr/share/applications/mynta-qt.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=Mynta Core
          Comment=Mynta cryptocurrency wallet
          Exec=mynta-qt %u
          Terminal=false
          Type=Application
          Icon=mynta
          Categories=Finance;Network;
          MimeType=x-scheme-handler/mynta;
          DESKTOP
            # Copy icon if available
            cp share/pixmaps/bitcoin256.png ${DEB_DIR}/usr/share/pixmaps/mynta.png 2>/dev/null || true
          fi
          
          # Create control file
          cat > ${DEB_DIR}/DEBIAN/control << EOF
          Package: mynta
          Version: ${MYNTA_VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libc6 (>= 2.31), libgcc-s1 (>= 3.0), libstdc++6 (>= 11)
          Maintainer: Mynta Developers <dev@myntacoin.org>
          Description: Mynta Core - Full node with Qt GUI wallet
           Mynta is a peer-to-peer digital currency with asset support.
           This package includes the daemon, CLI, and Qt GUI wallet.
          EOF
          
          # Copy docs
          cp doc/RELEASE_GUIDE.md ${DEB_DIR}/usr/share/doc/mynta/ 2>/dev/null || true
          
          # Build DEB
          dpkg-deb --build ${DEB_DIR}
          mv ${DEB_DIR}.deb release/mynta_${MYNTA_VERSION}_amd64.deb

      - name: Generate checksums
        run: |
          cd release
          for f in *.tar.gz *.deb; do
            [ -f "$f" ] && sha256sum "$f" > "${f}.sha256sum"
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: release/

  # =============================================================================
  # Windows x64 Build with Qt GUI (cross-compile from Linux)
  # =============================================================================
  build-windows:
    name: Windows x64
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Extract version from configure.ac
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION_MAJOR=$(grep "define(_CLIENT_VERSION_MAJOR" configure.ac | sed 's/.*,\s*\([0-9]*\)).*/\1/')
            VERSION_MINOR=$(grep "define(_CLIENT_VERSION_MINOR" configure.ac | sed 's/.*,\s*\([0-9]*\)).*/\1/')
            VERSION_REVISION=$(grep "define(_CLIENT_VERSION_REVISION" configure.ac | sed 's/.*,\s*\([0-9]*\)).*/\1/')
            VERSION="${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_REVISION}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected version: ${VERSION}"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            automake \
            autotools-dev \
            bsdmainutils \
            build-essential \
            curl \
            g++-mingw-w64-x86-64 \
            gcc-mingw-w64-x86-64 \
            git \
            libtool \
            pkg-config \
            python3 \
            zip \
            bison \
            nsis
          
          # Set MinGW to use POSIX threads (required for C++11/17)
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix
          sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix

      - name: Cache depends sources
        uses: actions/cache@v4
        with:
          path: depends/sources
          key: depends-sources-${{ hashFiles('depends/packages/*.mk') }}
          restore-keys: |
            depends-sources-

      - name: Cache depends built
        uses: actions/cache@v4
        with:
          path: depends/built
          key: windows-release-depends-qt-v1-${{ hashFiles('depends/packages/*.mk') }}-${{ hashFiles('depends/hosts/*.mk') }}
          restore-keys: |
            windows-release-depends-qt-v1-

      - name: Build depends (with Qt)
        run: |
          cd depends
          make HOST=x86_64-w64-mingw32 -j$(nproc)

      - name: Configure
        run: |
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/x86_64-w64-mingw32/share/config.site ./configure \
            --prefix=/ \
            --host=x86_64-w64-mingw32 \
            --disable-ccache \
            --disable-maintainer-mode \
            --disable-dependency-tracking \
            --enable-reduce-exports \
            --disable-bench \
            --disable-tests \
            --disable-gui-tests \
            --disable-bip70 \
            --enable-shared=no \
            CFLAGS="-O2 -g" \
            CXXFLAGS="-O2 -g"

      - name: Build
        run: make -j$(nproc)

      - name: Package ZIP
        env:
          MYNTA_VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p release
          DISTNAME="mynta-${MYNTA_VERSION}"
          
          mkdir -p stage/${DISTNAME}
          cp src/myntad.exe stage/${DISTNAME}/
          cp src/mynta-cli.exe stage/${DISTNAME}/
          cp src/qt/mynta-qt.exe stage/${DISTNAME}/ 2>/dev/null || echo "Qt wallet not built"
          cp doc/RELEASE_GUIDE.md stage/${DISTNAME}/README.md 2>/dev/null || echo "No README found"
          
          x86_64-w64-mingw32-strip stage/${DISTNAME}/*.exe 2>/dev/null || true
          
          cd stage
          zip -r ../release/${DISTNAME}-win64.zip ${DISTNAME}/

      - name: Generate checksums
        run: |
          cd release
          for f in *.zip; do
            [ -f "$f" ] && sha256sum "$f" > "${f}.sha256sum"
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: release/

  # =============================================================================
  # macOS ARM64 (Apple Silicon) Build with Qt GUI
  # Note: Intel Mac users can run ARM64 binaries via Rosetta 2
  # =============================================================================
  build-macos-arm64:
    name: macOS ARM64 (Apple Silicon)
    runs-on: macos-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Extract version from configure.ac
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION_MAJOR=$(grep "define(_CLIENT_VERSION_MAJOR" configure.ac | sed 's/.*,\s*\([0-9]*\)).*/\1/')
            VERSION_MINOR=$(grep "define(_CLIENT_VERSION_MINOR" configure.ac | sed 's/.*,\s*\([0-9]*\)).*/\1/')
            VERSION_REVISION=$(grep "define(_CLIENT_VERSION_REVISION" configure.ac | sed 's/.*,\s*\([0-9]*\)).*/\1/')
            VERSION="${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_REVISION}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected version: ${VERSION}"

      - name: Install Dependencies
        run: |
          brew install automake libtool pkg-config
          python3 -m pip install --break-system-packages setuptools

      - name: Cache depends sources
        uses: actions/cache@v4
        with:
          path: depends/sources
          key: depends-sources-${{ hashFiles('depends/packages/*.mk') }}
          restore-keys: |
            depends-sources-

      - name: Cache depends built
        uses: actions/cache@v4
        with:
          path: depends/built
          key: macos-arm64-release-depends-qt-v1-${{ hashFiles('depends/packages/*.mk') }}-${{ hashFiles('depends/hosts/darwin.mk') }}
          restore-keys: |
            macos-arm64-release-depends-qt-v1-

      - name: Build depends (with Qt)
        run: |
          cd depends
          make FORCE_USE_SYSTEM_CLANG=1 -j$(sysctl -n hw.ncpu)

      - name: Configure
        run: |
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/$(depends/config.guess)/share/config.site ./configure \
            --prefix=/ \
            --disable-ccache \
            --disable-maintainer-mode \
            --disable-dependency-tracking \
            --enable-reduce-exports \
            --disable-bench \
            --disable-tests \
            --disable-gui-tests \
            --disable-bip70 \
            CFLAGS="-O2 -g" \
            CXXFLAGS="-O2 -g"

      - name: Build
        run: make -j$(sysctl -n hw.ncpu)

      - name: Package tar.gz
        env:
          MYNTA_VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p release
          DISTNAME="mynta-${MYNTA_VERSION}"
          
          mkdir -p stage/${DISTNAME}/bin
          cp src/myntad stage/${DISTNAME}/bin/
          cp src/mynta-cli stage/${DISTNAME}/bin/
          
          # Copy Qt app bundle if it exists
          if [ -d src/qt/Mynta-Qt.app ]; then
            cp -R src/qt/Mynta-Qt.app stage/${DISTNAME}/
          elif [ -f src/qt/mynta-qt ]; then
            cp src/qt/mynta-qt stage/${DISTNAME}/bin/
          fi
          
          # Strip binaries
          strip stage/${DISTNAME}/bin/* 2>/dev/null || true
          
          # Add README
          cp doc/RELEASE_GUIDE.md stage/${DISTNAME}/README.md 2>/dev/null || echo "No README found"
          
          cd stage
          tar -czvf ../release/${DISTNAME}-osx-arm64.tar.gz ${DISTNAME}/

      - name: Generate checksums
        run: |
          cd release
          for f in *.tar.gz; do
            [ -f "$f" ] && shasum -a 256 "$f" > "${f}.sha256sum"
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: release/

  # =============================================================================
  # Create GitHub Release
  # =============================================================================
  create-release:
    name: Create Release
    needs: [build-linux, build-windows, build-macos-arm64]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.create_release == 'true' }}
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ needs.build-linux.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          
          # Move all files to release directory
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.deb" -o -name "*.dmg" -o -name "*.sha256sum" \) -exec mv {} release/ \;
          
          # Create combined SHA256SUMS file
          cd release
          cat *.sha256sum > SHA256SUMS.txt 2>/dev/null || true
          rm -f *.sha256sum
          
          # Copy documentation
          cp ../doc/RELEASE_GUIDE.md ./ 2>/dev/null || true
          
          echo "=== Release Files ==="
          ls -la
          echo "=== Release Version: ${{ env.RELEASE_VERSION }} ==="

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.RELEASE_VERSION }}
          name: Mynta Core v${{ env.RELEASE_VERSION }}
          body: |
            ## Mynta Core v${{ env.RELEASE_VERSION }}
            
            This release includes full Qt GUI wallet and command-line tools for all major platforms.
            
            | Binary | Purpose |
            |--------|---------|
            | `mynta-qt` | Full GUI wallet with built-in node |
            | `myntad` | Headless daemon (servers) |
            | `mynta-cli` | Command-line RPC interface |
            
            ---
            
            ### Downloads
            
            #### 🐧 Linux (x86_64)
            | Format | File | Description |
            |--------|------|-------------|
            | DEB | `mynta_${{ env.RELEASE_VERSION }}_amd64.deb` | Ubuntu/Debian installer |
            | tar.gz | `mynta-${{ env.RELEASE_VERSION }}-x86_64-linux-gnu.tar.gz` | Manual install |
            
            **Installation:**
            ```bash
            # DEB (Ubuntu/Debian)
            sudo dpkg -i mynta_${{ env.RELEASE_VERSION }}_amd64.deb
            mynta-qt
            
            # Manual (tar.gz)
            tar -xzf mynta-${{ env.RELEASE_VERSION }}-x86_64-linux-gnu.tar.gz
            ./mynta-${{ env.RELEASE_VERSION }}/bin/mynta-qt
            ```
            
            #### 🪟 Windows (x64)
            | Format | File | Description |
            |--------|------|-------------|
            | ZIP | `mynta-${{ env.RELEASE_VERSION }}-win64.zip` | Portable |
            
            **Installation:**
            1. Download and extract the ZIP
            2. Run `mynta-qt.exe` for the GUI wallet
            3. Or run `myntad.exe` for the daemon only
            
            #### 🍎 macOS (Apple Silicon)
            | Format | File | Description |
            |--------|------|-------------|
            | tar.gz | `mynta-${{ env.RELEASE_VERSION }}-osx-arm64.tar.gz` | macOS (M1/M2/M3/M4) |
            
            **Installation:**
            ```bash
            # Extract
            tar -xzf mynta-${{ env.RELEASE_VERSION }}-osx-arm64.tar.gz
            
            # Run (first time: right-click → Open to bypass Gatekeeper)
            ./mynta-${{ env.RELEASE_VERSION }}/bin/mynta-qt
            ```
            
            > **Intel Mac users:** The ARM64 binary runs on Intel Macs via Rosetta 2 (automatically installed on first use).
            
            ---
            
            ### Quick Start
            
            1. **GUI Wallet:** Just run `mynta-qt` - it includes a built-in node
            
            2. **Headless Server:** Create config and run daemon
            ```ini
            # ~/.mynta/mynta.conf (Linux/macOS) or %APPDATA%\Mynta\mynta.conf (Windows)
            server=1
            rpcuser=myntarpc
            rpcpassword=your_secure_password_here
            ```
            ```bash
            myntad -daemon
            mynta-cli getblockchaininfo
            ```
            
            ---
            
            ### Verification
            
            ```bash
            # Linux/macOS
            sha256sum -c SHA256SUMS.txt  # or shasum -a 256 -c on macOS
            
            # Windows (PowerShell)
            Get-FileHash -Algorithm SHA256 mynta-${{ env.RELEASE_VERSION }}-win64.zip
            ```
            
            ---
            
            ### Network Information
            
            | Network | Port | RPC Port | Data Directory |
            |---------|------|----------|----------------|
            | Mainnet | 8767 | 8766 | `~/.mynta` (Linux/macOS), `%APPDATA%\Mynta` (Win) |
            | Testnet | 18770 | 18766 | `<datadir>/testnet3` |
            
            ### Chain Start Time
            
            - **Mainnet Launch:** January 15, 2026 00:00:00 UTC
            
            ---
            
            ### Provably Fair Launch
            
            - ✅ 3% dev allocation enforced at consensus
            - ✅ No premine - genesis follows standard subsidy rules
            - ✅ All code is open source and auditable
            
          draft: false
          prerelease: false
          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
