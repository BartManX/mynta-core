name: Build Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
      create_release:
        description: 'Create GitHub Release'
        required: true
        default: true
        type: boolean

env:
  MYNTA_VERSION: ${{ github.event.inputs.version }}

jobs:
  # =============================================================================
  # Linux x86_64 Build (using depends for reproducibility)
  # =============================================================================
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            automake \
            autotools-dev \
            bsdmainutils \
            build-essential \
            curl \
            git \
            libtool \
            pkg-config \
            python3 \
            bison \
            libfuse2 \
            zsync \
            desktop-file-utils \
            appstream

      - name: Cache depends
        uses: actions/cache@v4
        with:
          path: |
            depends/built
            depends/sources
          key: linux-depends-${{ hashFiles('depends/packages/*.mk') }}
          restore-keys: |
            linux-depends-

      - name: Build depends
        run: |
          cd depends
          make HOST=x86_64-linux-gnu -j$(nproc)

      - name: Build BLST
        run: |
          cd src/bls/blst
          ./build.sh
          cd ../../..

      - name: Configure
        run: |
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/x86_64-linux-gnu/share/config.site ./configure \
            --prefix=/ \
            --disable-ccache \
            --disable-maintainer-mode \
            --disable-dependency-tracking \
            --enable-glibc-back-compat \
            --enable-reduce-exports \
            --disable-bench \
            --disable-tests \
            --disable-gui-tests \
            CFLAGS="-O2 -g" \
            CXXFLAGS="-O2 -g" \
            LDFLAGS="-static-libstdc++"

      - name: Build
        run: make -j$(nproc)

      - name: Package tar.gz
        run: |
          mkdir -p release
          DISTNAME="mynta-${MYNTA_VERSION}"
          
          mkdir -p stage/${DISTNAME}/bin
          cp src/myntad stage/${DISTNAME}/bin/
          cp src/mynta-cli stage/${DISTNAME}/bin/
          cp src/mynta-tx stage/${DISTNAME}/bin/
          cp src/qt/mynta-qt stage/${DISTNAME}/bin/ 2>/dev/null || echo "Qt wallet not built"
          
          # Strip binaries
          strip stage/${DISTNAME}/bin/* 2>/dev/null || true
          
          # Add README
          cp doc/RELEASE_GUIDE.md stage/${DISTNAME}/README.md
          
          cd stage
          tar -czvf ../release/${DISTNAME}-x86_64-linux-gnu.tar.gz ${DISTNAME}/

      - name: Package DEB
        run: |
          DISTNAME="mynta-${MYNTA_VERSION}"
          DEB_DIR="mynta_${MYNTA_VERSION}_amd64"
          
          mkdir -p ${DEB_DIR}/DEBIAN
          mkdir -p ${DEB_DIR}/usr/bin
          mkdir -p ${DEB_DIR}/usr/share/applications
          mkdir -p ${DEB_DIR}/usr/share/icons/hicolor/256x256/apps
          mkdir -p ${DEB_DIR}/usr/share/doc/mynta
          
          # Copy binaries
          cp src/myntad ${DEB_DIR}/usr/bin/
          cp src/mynta-cli ${DEB_DIR}/usr/bin/
          cp src/mynta-tx ${DEB_DIR}/usr/bin/
          cp src/qt/mynta-qt ${DEB_DIR}/usr/bin/ 2>/dev/null || echo "Qt wallet not available"
          strip ${DEB_DIR}/usr/bin/* 2>/dev/null || true
          
          # Create control file (no leading whitespace!)
          cat > ${DEB_DIR}/DEBIAN/control << 'EOF'
Package: mynta
Version: ${MYNTA_VERSION}
Section: utils
Priority: optional
Architecture: amd64
Depends: libc6 (>= 2.31), libgcc-s1 (>= 3.0), libstdc++6 (>= 11)
Maintainer: Mynta Developers <dev@myntacoin.org>
Description: Mynta Core - Full node and wallet
 Mynta is a peer-to-peer digital currency with asset support.
 This package includes the Qt wallet and command-line tools.
 The Qt wallet includes a built-in daemon - you do NOT need myntad.
EOF
          # Replace version in control file
          sed -i "s/\${MYNTA_VERSION}/${MYNTA_VERSION}/g" ${DEB_DIR}/DEBIAN/control
          
          # Create desktop file
          cat > ${DEB_DIR}/usr/share/applications/mynta-qt.desktop << 'EOF'
[Desktop Entry]
Name=Mynta Core
Comment=Mynta wallet and full node
Exec=mynta-qt %u
Terminal=false
Type=Application
Icon=mynta
Categories=Finance;Network;
MimeType=x-scheme-handler/mynta;
EOF
          
          # Copy icon
          cp share/pixmaps/mynta256.png ${DEB_DIR}/usr/share/icons/hicolor/256x256/apps/mynta.png
          
          # Copy docs
          cp doc/RELEASE_GUIDE.md ${DEB_DIR}/usr/share/doc/mynta/
          
          # Build DEB
          dpkg-deb --build ${DEB_DIR}
          mv ${DEB_DIR}.deb release/mynta_${MYNTA_VERSION}_amd64.deb

      - name: Package AppImage
        run: |
          DISTNAME="mynta-${MYNTA_VERSION}"
          
          # Check if Qt wallet was built
          if [ ! -f "src/qt/mynta-qt" ]; then
            echo "Qt wallet not built, skipping AppImage"
            exit 0
          fi
          
          # Download linuxdeploy
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          
          # Create AppDir structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          
          cp src/qt/mynta-qt AppDir/usr/bin/
          cp src/myntad AppDir/usr/bin/
          cp src/mynta-cli AppDir/usr/bin/
          
          # Create desktop file
          cat > AppDir/usr/share/applications/mynta-qt.desktop << 'EOF'
[Desktop Entry]
Name=Mynta Core
Comment=Mynta wallet and full node
Exec=mynta-qt
Terminal=false
Type=Application
Icon=mynta
Categories=Finance;Network;
EOF
          
          # Copy icon
          cp share/pixmaps/mynta256.png AppDir/usr/share/icons/hicolor/256x256/apps/mynta.png
          
          # Create symlinks required by linuxdeploy
          ln -sf usr/share/applications/mynta-qt.desktop AppDir/mynta-qt.desktop
          ln -sf usr/share/icons/hicolor/256x256/apps/mynta.png AppDir/mynta.png
          
          # Build AppImage
          export VERSION=${MYNTA_VERSION}
          export QT_SELECT=5
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage || echo "AppImage creation completed with warnings"
          
          mv Mynta*.AppImage release/Mynta-${MYNTA_VERSION}-x86_64.AppImage 2>/dev/null || true

      - name: Generate checksums
        run: |
          cd release
          for f in *.tar.gz *.deb *.AppImage; do
            [ -f "$f" ] && sha256sum "$f" > "${f}.sha256sum"
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: release/

  # =============================================================================
  # Windows x64 Build (cross-compile from Linux)
  # =============================================================================
  build-windows:
    name: Windows x64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            automake \
            autotools-dev \
            bsdmainutils \
            build-essential \
            curl \
            mingw-w64 \
            mingw-w64-x86-64-dev \
            git \
            libtool \
            nsis \
            pkg-config \
            python3 \
            zip \
            bison \
            osslsigncode
          
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix
          sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix

      - name: Cache depends
        uses: actions/cache@v4
        with:
          path: |
            depends/built
            depends/sources
          key: windows-depends-${{ hashFiles('depends/packages/*.mk') }}
          restore-keys: |
            windows-depends-

      - name: Build depends
        run: |
          cd depends
          make HOST=x86_64-w64-mingw32 -j$(nproc)

      - name: Build BLST for Windows
        run: |
          cd src/bls/blst
          rm -f libblst.a *.o 2>/dev/null || true
          CC=x86_64-w64-mingw32-gcc ./build.sh
          cd ../../..

      - name: Configure
        run: |
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/x86_64-w64-mingw32/share/config.site ./configure \
            --prefix=/ \
            --disable-ccache \
            --disable-maintainer-mode \
            --disable-dependency-tracking \
            --enable-reduce-exports \
            --disable-bench \
            --disable-tests \
            --disable-gui-tests \
            --enable-shared=no \
            CFLAGS="-O2 -g" \
            CXXFLAGS="-O2 -g"

      - name: Build
        run: make -j$(nproc)

      - name: Package ZIP
        run: |
          mkdir -p release
          DISTNAME="mynta-${MYNTA_VERSION}"
          
          mkdir -p stage/${DISTNAME}
          cp src/myntad.exe stage/${DISTNAME}/
          cp src/mynta-cli.exe stage/${DISTNAME}/
          cp src/mynta-tx.exe stage/${DISTNAME}/
          cp src/qt/mynta-qt.exe stage/${DISTNAME}/ 2>/dev/null || echo "Qt wallet not built"
          cp doc/RELEASE_GUIDE.md stage/${DISTNAME}/README.md
          
          x86_64-w64-mingw32-strip stage/${DISTNAME}/*.exe 2>/dev/null || true
          
          cd stage
          zip -r ../release/${DISTNAME}-win64.zip ${DISTNAME}/

      - name: Package NSIS Installer
        run: |
          # Build NSIS installer if Qt wallet exists
          if [ -f "src/qt/mynta-qt.exe" ]; then
            make deploy 2>/dev/null && mv *-setup.exe release/mynta-${MYNTA_VERSION}-win64-setup.exe || echo "NSIS installer not created"
          fi

      - name: Generate checksums
        run: |
          cd release
          for f in *.zip *.exe *.msi; do
            [ -f "$f" ] && sha256sum "$f" > "${f}.sha256sum"
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: release/

  # =============================================================================
  # macOS x64 Build (Intel - for maximum compatibility)
  # =============================================================================
  build-macos:
    name: macOS x64
    runs-on: macos-13  # Intel runner for x86_64 builds
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          brew install \
            automake \
            libtool \
            pkg-config \
            python@3 \
            create-dmg

      - name: Cache depends
        uses: actions/cache@v4
        with:
          path: |
            depends/built
            depends/sources
          key: macos-depends-${{ hashFiles('depends/packages/*.mk') }}
          restore-keys: |
            macos-depends-

      - name: Build depends
        run: |
          cd depends
          make HOST=x86_64-apple-darwin -j$(sysctl -n hw.ncpu)

      - name: Build BLST
        run: |
          cd src/bls/blst
          ./build.sh
          cd ../../..

      - name: Configure
        run: |
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/x86_64-apple-darwin/share/config.site ./configure \
            --prefix=/ \
            --disable-ccache \
            --disable-maintainer-mode \
            --disable-dependency-tracking \
            --enable-reduce-exports \
            --disable-bench \
            --disable-tests \
            --disable-gui-tests \
            CFLAGS="-O2" \
            CXXFLAGS="-O2"

      - name: Build
        run: make -j$(sysctl -n hw.ncpu)

      - name: Package tar.gz
        run: |
          mkdir -p release
          DISTNAME="mynta-${MYNTA_VERSION}"
          
          mkdir -p stage/${DISTNAME}/bin
          cp src/myntad stage/${DISTNAME}/bin/
          cp src/mynta-cli stage/${DISTNAME}/bin/
          cp src/mynta-tx stage/${DISTNAME}/bin/
          cp src/qt/mynta-qt stage/${DISTNAME}/bin/ 2>/dev/null || echo "Qt wallet not built"
          cp doc/RELEASE_GUIDE.md stage/${DISTNAME}/README.md
          
          strip stage/${DISTNAME}/bin/* 2>/dev/null || true
          
          cd stage
          tar -czvf ../release/${DISTNAME}-osx64.tar.gz ${DISTNAME}/

      - name: Package DMG
        run: |
          DISTNAME="mynta-${MYNTA_VERSION}"
          
          # Only create DMG if Qt wallet was built
          if [ ! -f "src/qt/mynta-qt" ]; then
            echo "Qt wallet not built, skipping DMG"
            exit 0
          fi
          
          # Create app bundle structure
          mkdir -p "Mynta-Qt.app/Contents/MacOS"
          mkdir -p "Mynta-Qt.app/Contents/Resources"
          
          # Copy binary
          cp src/qt/mynta-qt "Mynta-Qt.app/Contents/MacOS/Mynta-Qt"
          
          # Create Info.plist
          cat > "Mynta-Qt.app/Contents/Info.plist" << EOF
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>CFBundleExecutable</key>
  <string>Mynta-Qt</string>
  <key>CFBundleIdentifier</key>
  <string>org.myntacoin.Mynta-Qt</string>
  <key>CFBundleName</key>
  <string>Mynta-Qt</string>
  <key>CFBundleVersion</key>
  <string>${MYNTA_VERSION}</string>
  <key>CFBundleShortVersionString</key>
  <string>${MYNTA_VERSION}</string>
  <key>CFBundlePackageType</key>
  <string>APPL</string>
  <key>LSMinimumSystemVersion</key>
  <string>10.14</string>
  <key>NSHighResolutionCapable</key>
  <true/>
  <key>NSPrincipalClass</key>
  <string>NSApplication</string>
</dict>
</plist>
EOF
          
          # Copy icon if available
          if [ -f "share/pixmaps/mynta256.png" ]; then
            cp share/pixmaps/mynta256.png "Mynta-Qt.app/Contents/Resources/mynta.png"
          fi
          
          # Create DMG
          create-dmg \
            --volname "Mynta Core ${MYNTA_VERSION}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 400 185 \
            "release/${DISTNAME}-osx64.dmg" \
            "Mynta-Qt.app" || echo "DMG creation completed with warnings"

      - name: Generate checksums
        run: |
          cd release
          for f in *.tar.gz *.dmg; do
            [ -f "$f" ] && shasum -a 256 "$f" > "${f}.sha256sum"
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: release/

  # =============================================================================
  # macOS ARM64 Build (Apple Silicon)
  # =============================================================================
  build-macos-arm64:
    name: macOS ARM64
    runs-on: macos-14  # ARM64 runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          brew install \
            automake \
            libtool \
            pkg-config \
            python@3 \
            create-dmg

      - name: Cache depends
        uses: actions/cache@v4
        with:
          path: |
            depends/built
            depends/sources
          key: macos-arm64-depends-${{ hashFiles('depends/packages/*.mk') }}
          restore-keys: |
            macos-arm64-depends-

      - name: Build depends
        run: |
          cd depends
          make HOST=arm64-apple-darwin -j$(sysctl -n hw.ncpu)

      - name: Build BLST
        run: |
          cd src/bls/blst
          ./build.sh
          cd ../../..

      - name: Configure
        run: |
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/arm64-apple-darwin/share/config.site ./configure \
            --prefix=/ \
            --disable-ccache \
            --disable-maintainer-mode \
            --disable-dependency-tracking \
            --enable-reduce-exports \
            --disable-bench \
            --disable-tests \
            --disable-gui-tests \
            CFLAGS="-O2" \
            CXXFLAGS="-O2"

      - name: Build
        run: make -j$(sysctl -n hw.ncpu)

      - name: Package tar.gz
        run: |
          mkdir -p release
          DISTNAME="mynta-${MYNTA_VERSION}"
          
          mkdir -p stage/${DISTNAME}/bin
          cp src/myntad stage/${DISTNAME}/bin/
          cp src/mynta-cli stage/${DISTNAME}/bin/
          cp src/mynta-tx stage/${DISTNAME}/bin/
          cp src/qt/mynta-qt stage/${DISTNAME}/bin/ 2>/dev/null || echo "Qt wallet not built"
          cp doc/RELEASE_GUIDE.md stage/${DISTNAME}/README.md
          
          strip stage/${DISTNAME}/bin/* 2>/dev/null || true
          
          cd stage
          tar -czvf ../release/${DISTNAME}-osx-arm64.tar.gz ${DISTNAME}/

      - name: Package DMG
        run: |
          DISTNAME="mynta-${MYNTA_VERSION}"
          
          if [ ! -f "src/qt/mynta-qt" ]; then
            echo "Qt wallet not built, skipping DMG"
            exit 0
          fi
          
          mkdir -p "Mynta-Qt.app/Contents/MacOS"
          mkdir -p "Mynta-Qt.app/Contents/Resources"
          
          cp src/qt/mynta-qt "Mynta-Qt.app/Contents/MacOS/Mynta-Qt"
          
          cat > "Mynta-Qt.app/Contents/Info.plist" << EOF
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>CFBundleExecutable</key>
  <string>Mynta-Qt</string>
  <key>CFBundleIdentifier</key>
  <string>org.myntacoin.Mynta-Qt</string>
  <key>CFBundleName</key>
  <string>Mynta-Qt</string>
  <key>CFBundleVersion</key>
  <string>${MYNTA_VERSION}</string>
  <key>CFBundleShortVersionString</key>
  <string>${MYNTA_VERSION}</string>
  <key>CFBundlePackageType</key>
  <string>APPL</string>
  <key>LSMinimumSystemVersion</key>
  <string>11.0</string>
  <key>NSHighResolutionCapable</key>
  <true/>
  <key>NSPrincipalClass</key>
  <string>NSApplication</string>
</dict>
</plist>
EOF
          
          if [ -f "share/pixmaps/mynta256.png" ]; then
            cp share/pixmaps/mynta256.png "Mynta-Qt.app/Contents/Resources/mynta.png"
          fi
          
          create-dmg \
            --volname "Mynta Core ${MYNTA_VERSION}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 400 185 \
            "release/${DISTNAME}-osx-arm64.dmg" \
            "Mynta-Qt.app" || echo "DMG creation completed with warnings"

      - name: Generate checksums
        run: |
          cd release
          for f in *.tar.gz *.dmg; do
            [ -f "$f" ] && shasum -a 256 "$f" > "${f}.sha256sum"
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: release/

  # =============================================================================
  # Create GitHub Release
  # =============================================================================
  create-release:
    name: Create Release
    needs: [build-linux, build-windows, build-macos, build-macos-arm64]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.create_release == 'true' }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          
          # Move all files to release directory
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.exe" -o -name "*.dmg" -o -name "*.sha256sum" \) -exec mv {} release/ \;
          
          # Create combined SHA256SUMS file
          cd release
          cat *.sha256sum > SHA256SUMS.txt 2>/dev/null || true
          rm -f *.sha256sum
          
          # Copy documentation
          cp ../doc/RELEASE_GUIDE.md ./
          
          echo "=== Release Files ==="
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Mynta Core v${{ github.event.inputs.version }}
          body: |
            ## Mynta Core v${{ github.event.inputs.version }}
            
            ### ⚠️ Important: You Do NOT Need the Daemon Binary
            
            **The Mynta-Qt wallet includes a built-in daemon.** You do NOT need to run `myntad` separately unless you're running a headless server.
            
            | Binary | Purpose |
            |--------|---------|
            | `mynta-qt` | Full GUI wallet with built-in daemon (recommended) |
            | `myntad` | Headless daemon (servers only) |
            | `mynta-cli` | Command-line RPC interface |
            | `mynta-tx` | Transaction utility |
            
            ---
            
            ### Downloads
            
            #### 🐧 Linux (x86_64)
            | Format | File | Description |
            |--------|------|-------------|
            | DEB | `mynta_${{ github.event.inputs.version }}_amd64.deb` | Ubuntu/Debian installer |
            | AppImage | `Mynta-${{ github.event.inputs.version }}-x86_64.AppImage` | Portable, run anywhere |
            | tar.gz | `mynta-${{ github.event.inputs.version }}-x86_64-linux-gnu.tar.gz` | Manual install |
            
            **Installation:**
            ```bash
            # DEB (Ubuntu/Debian)
            sudo dpkg -i mynta_${{ github.event.inputs.version }}_amd64.deb
            mynta-qt
            
            # AppImage (any distro)
            chmod +x Mynta-${{ github.event.inputs.version }}-x86_64.AppImage
            ./Mynta-${{ github.event.inputs.version }}-x86_64.AppImage
            
            # Manual (tar.gz)
            tar -xzf mynta-${{ github.event.inputs.version }}-x86_64-linux-gnu.tar.gz
            ./mynta-${{ github.event.inputs.version }}/bin/mynta-qt
            ```
            
            #### 🪟 Windows (x64)
            | Format | File | Description |
            |--------|------|-------------|
            | Installer | `mynta-${{ github.event.inputs.version }}-win64-setup.exe` | NSIS installer |
            | ZIP | `mynta-${{ github.event.inputs.version }}-win64.zip` | Portable |
            
            **Installation:**
            1. Download and extract the ZIP, or run the installer
            2. Double-click `mynta-qt.exe`
            3. On first run, click "More info" → "Run anyway" if Windows shows a warning
            
            **Configuration file location:** `%APPDATA%\Mynta\mynta.conf`
            
            #### 🍎 macOS
            | Format | File | Description |
            |--------|------|-------------|
            | DMG (Intel) | `mynta-${{ github.event.inputs.version }}-osx64.dmg` | Disk image for Intel Macs |
            | DMG (ARM64) | `mynta-${{ github.event.inputs.version }}-osx-arm64.dmg` | Disk image for Apple Silicon |
            | tar.gz (Intel) | `mynta-${{ github.event.inputs.version }}-osx64.tar.gz` | Manual install |
            | tar.gz (ARM64) | `mynta-${{ github.event.inputs.version }}-osx-arm64.tar.gz` | Manual install |
            
            **Installation:**
            1. Open the DMG file
            2. Drag Mynta-Qt to Applications
            3. First run: Right-click → Open (to bypass Gatekeeper)
            
            **Configuration file location:** `~/Library/Application Support/Mynta/mynta.conf`
            
            ---
            
            ### Common Startup Flags
            
            | Flag | Description |
            |------|-------------|
            | `-testnet` | Run on testnet |
            | `-datadir=<path>` | Custom data directory |
            | `-gen` | Enable mining |
            | `-genproclimit=N` | Set mining threads |
            | `-server` | Enable RPC server |
            | `-min` | Start minimized to tray |
            
            **Example:**
            ```bash
            mynta-qt -testnet -server
            ```
            
            ---
            
            ### Using mynta-cli with Qt Wallet
            
            The Qt wallet has a built-in RPC server. To use `mynta-cli`:
            
            1. Add to your `mynta.conf`:
               ```ini
               server=1
               rpcuser=myntarpc
               rpcpassword=your_secure_password
               ```
            2. Restart the wallet
            3. Run commands:
               ```bash
               mynta-cli getblockchaininfo
               mynta-cli getbalance
               mynta-cli getnewaddress "label"
               ```
            
